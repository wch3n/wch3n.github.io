<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="utf-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <meta name="theme-color" content="#102330">
   <link rel="stylesheet" type="text/css" href="{{ site.path }}/css/style.css">
<!--   <link rel="alternate" type="application/atom+xml" href="{{ site.path }}/feed.xml" title="News Feed">
-->
{% seo %}
</head>
<body class="{{ page.body_class | default: 'site-page' }}">

<div class="site-shell">
  <header class="site-header">
    <div class="site-header__inner container">
      <a class="site-brand" href="{{ site.path }}/" aria-label="Wei Chen home">
        <span class="site-brand__name">{{ site.author.name }}</span>
        <span class="site-brand__tag">{{ site.description }}</span>
      </a>

      <nav class="site-nav" aria-label="Primary">
        <a href="{{ site.path }}/#research">Research</a>
        <a href="{{ site.path }}/#software">Software</a>
        <a href="{{ site.path }}/#publications">Publications</a>
        <a href="https://github.com/wch3n">GitHub</a>
        <a class="site-nav__cta" href="{{ site.path }}/assets/wei-chen-cv.pdf">CV</a>
      </nav>
    </div>
  </header>

  <main class="page-content">
    <div class="container">
      {{ content }}
    </div>
  </main>

  <footer class="site-footer">
    <div class="container site-footer__inner">
      <p>Based in Overijse, Belgium. Research in computational materials science at UCLouvain.</p>
      <div class="site-footer__links">
        <a href="mailto:wei.chen@uclouvain.be">Email</a>
        <a href="https://scholar.google.com/citations?user=ouy6ESIAAAAJa">Google Scholar</a>
        <a href="https://orcid.org/0000-0002-7496-0341">ORCID</a>
        <a href="https://github.com/wch3n">GitHub</a>
      </div>
    </div>
  </footer>
</div>

</body>
</html>
