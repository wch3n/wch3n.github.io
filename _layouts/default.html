<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="utf-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <meta name="theme-color" content="#102330">
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
   <link rel="stylesheet" type="text/css" href="{{ site.path }}/css/style.css">
<!--   <link rel="alternate" type="application/atom+xml" href="{{ site.path }}/feed.xml" title="News Feed">
-->
{% seo %}
</head>
<body class="{{ page.body_class | default: 'site-page' }}">

<div class="site-shell">
  <header class="site-header">
    <div class="site-header__inner container">
      <a class="site-brand" href="{{ site.path }}/" aria-label="Wei Chen home">
        <span class="site-brand__name">{{ site.author.name }}</span>
        <span class="site-brand__tag">{{ site.description }}</span>
      </a>

      <nav class="site-nav" aria-label="Primary">
        <a href="{{ site.path }}/#research">Research</a>
        <a href="{{ site.path }}/#software">Software</a>
        <a href="{{ site.path }}/#publications">Publications</a>
      </nav>
    </div>
  </header>

  <main class="page-content">
    <div class="container">
      {{ content }}
    </div>
  </main>

  <footer class="site-footer">
    <div class="container site-footer__inner">
      <p>Research in computational materials science at UCLouvain.</p>
      <div class="icon-links icon-links--footer" aria-label="External links">
        <a class="icon-link" href="mailto:wei.chen@uclouvain.be" aria-label="Email">
          <i class="fa-solid fa-envelope" aria-hidden="true"></i>
        </a>
        <a class="icon-link" href="https://scholar.google.com/citations?user=ouy6ESIAAAAJa" aria-label="Google Scholar">
          <i class="fa-solid fa-graduation-cap" aria-hidden="true"></i>
        </a>
        <a class="icon-link" href="https://orcid.org/0000-0002-7496-0341" aria-label="ORCID">
          <i class="fa-brands fa-orcid" aria-hidden="true"></i>
        </a>
        <a class="icon-link" href="https://github.com/wch3n" aria-label="GitHub">
          <i class="fa-brands fa-github" aria-hidden="true"></i>
        </a>
      </div>
    </div>
  </footer>
</div>

</body>
</html>
